# Moons Experiment Configuration
# Two interleaving half circles - requires non-linear decision boundary

experiment:
  name: moons_experiment
  seed: 42

dataset:
  name: moons
  n_samples: 200
  noise: 0.1  # Gaussian noise

model:
  name: mlp
  input_dim: 2
  hidden_dims: [16, 16]  # Larger network for more complex data
  output_dim: 2
  activation: relu

training:
  epochs: 300
  batch_size: 32
  learning_rate: 0.001

output:
  save_dir: outputs
